<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ingen adgang – IT Support</title>
  <link rel="stylesheet" href="/assets/navbar.css" />
  <meta name="herrup-app" content="it-support">
  <meta name="herrup-title" content="IT Support">
  <meta name="herrup-subtitle" content="Adgang mangler">
  <script src="/assets/navbar.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .container {
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }
    .box {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 48px 32px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { margin: 0 0 10px; font-size: 1.8rem; color: #111827; }
    p { color: #6b7280; margin: 8px 0; line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 28px;
      background: #850c18;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
    }
    .btn:hover { background: #6b0913; }
    #userLine { margin-top: 18px; font-size: .9rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="icon">🔒</div>
      <h1>Ingen adgang</h1>
      <p>Din bruger har ikke adgang til <strong>IT Support Portalen</strong>.</p>
      <p>Kontakt din administrator for at få tildelt de nødvendige rettigheder.</p>
      <a class="btn" href="/.auth/logout?post_logout_redirect_uri=/">Log ud og prøv igen</a>
      <div id="userLine"></div>
    </div>
  </div>
  <script>
  (async () => {
    try {
      const r = await fetch("/.auth/me");
      const me = await r.json();
      const user = me?.clientPrincipal?.userDetails;
      if (user) {
        document.getElementById("userLine").textContent = "Logget ind som: " + user;
      }
    } catch {}
  })();
  </script>
</body>
</html>
