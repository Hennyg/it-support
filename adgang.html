<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adgang — IT Support</title>
  <link rel="stylesheet" href="/assets/navbar.css" />
  <meta name="herrup-app" content="it-support">
  <meta name="herrup-title" content="IT Support">
  <meta name="herrup-subtitle" content="Adgangsstyring">
  <script src="/assets/navbar.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #111827; }

    .container { max-width: 1400px; margin: 0 auto; padding: 32px 20px; }

    /* Tile */
    .tile { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.05); margin-bottom: 24px; overflow: hidden; }
    .tile-header { display: flex; align-items: center; gap: 12px; padding: 18px 24px; border-bottom: 1px solid #f3f4f6; cursor: pointer; user-select: none; }
    .tile-icon { font-size: 1.4rem; }
    .tile-title { font-size: 1.05rem; font-weight: 700; color: #111827; flex: 1; }
    .tile-chevron { color: #9ca3af; font-size: 1rem; transition: transform .2s; }
    .tile-chevron.open { transform: rotate(180deg); }
    .tile-body { padding: 24px; }

    /* Gruppe liste */
    .group-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .group-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border: 1px solid #e5e7eb; border-radius: 10px; cursor: pointer; transition: background .15s; }
    .group-item:hover { background: #f9fafb; }
    .group-item.active { background: #fef3f2; border-color: #fca5a5; }
    .group-name { font-weight: 600; font-size: .9rem; color: #111827; }
    .group-email { font-size: .8rem; color: #6b7280; }
    .member-count { margin-left: auto; background: #f3f4f6; border-radius: 999px; padding: 2px 10px; font-size: .8rem; color: #374151; font-weight: 600; white-space: nowrap; }

    /* Editor */
    .editor { display: none; }
    .editor.visible { display: grid; grid-template-columns: 280px 1fr auto 1fr; gap: 0; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }

    /* Kolonner */
    .col { display: flex; flex-direction: column; }
    .col-header { padding: 12px 16px; background: #1f2937; color: #fff; font-size: .85rem; font-weight: 700; }
    .col-header.light { background: #f8fafc; color: #374151; border-bottom: 1px solid #e5e7eb; }
    .col-body { flex: 1; overflow-y: auto; max-height: 420px; }

    /* Stamdata kolonne */
    .stamdata { border-right: 1px solid #e5e7eb; }
    .stamdata .col-body { padding: 16px; }
    .sd-row { margin-bottom: 12px; }
    .sd-label { font-size: .75rem; color: #6b7280; margin-bottom: 2px; }
    .sd-value { font-size: .88rem; color: #111827; font-weight: 500; word-break: break-word; }

    /* Member liste */
    .member-list { border-right: 1px solid #e5e7eb; }
    .user-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f9fafb; transition: background .1s; }
    .user-item:hover { background: #f9fafb; }
    .user-item.selected { background: #eff6ff; }
    .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: #850c18; color: #fff; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: .85rem; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: .75rem; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid #d1d5db; flex-shrink: 0; }
    .user-item.selected .user-check { background: #850c18; border-color: #850c18; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: center; }

    /* Knap kolonne */
    .btn-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 16px 12px; background: #f8fafc; border-right: 1px solid #e5e7eb; min-width: 56px; }
    .arrow-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .arrow-btn:hover { background: #850c18; color: #fff; border-color: #850c18; }
    .arrow-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* Search */
    .col-search { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
    .col-search input { width: 100%; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: .82rem; outline: none; }
    .col-search input:focus { border-color: #850c18; }

    /* Footer */
    .editor-footer { display: none; padding: 14px 20px; background: #f8fafc; border-top: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .editor-footer.visible { display: flex; }
    .changes-info { font-size: .85rem; color: #6b7280; }
    .changes-info strong { color: #111827; }
    .btn-save { padding: 9px 24px; background: #850c18; color: #fff; border: none; border-radius: 10px; font-size: .9rem; font-weight: 600; cursor: pointer; }
    .btn-save:hover { background: #6b0913; }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .btn-cancel { padding: 9px 16px; background: #fff; color: #374151; border: 1px solid #e5e7eb; border-radius: 10px; font-size: .9rem; cursor: pointer; }
    .btn-cancel:hover { background: #f3f4f6; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 12px; font-size: .9rem; font-weight: 600; color: #fff; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.ok  { background: #16a34a; }
    .toast.err { background: #dc2626; }

    /* Loading */
    .loading { padding: 32px; text-align: center; color: #9ca3af; font-size: .9rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e5e7eb; border-top-color: #850c18; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { padding: 20px; text-align: center; color: #9ca3af; font-size: .85rem; }
  </style>
</head>
<body>

<div id="appContent" style="display:none;">
  <div class="container">

    <!-- Tile: Adgang til portaler -->
    <div class="tile">
      <div class="tile-header" onclick="toggleTile(this)">
        <div class="tile-icon">🔐</div>
        <div class="tile-title">Adgang til portaler</div>
        <div class="tile-chevron open">▼</div>
      </div>
      <div class="tile-body">

        <div id="groupsLoading" class="loading"><span class="spinner"></span>Henter grupper...</div>
        <div id="groupsError" style="display:none;" class="empty">Kunne ikke hente grupper.</div>

        <div id="groupsContainer" style="display:none;">
          <div class="group-list" id="groupList"></div>

          <div class="editor" id="groupEditor">
            <div class="col stamdata">
              <div class="col-header">Stamdata</div>
              <div class="col-body" id="stamdataBody"></div>
            </div>

            <div class="col member-list">
              <div class="col-header light">Nuværende medlemmer <span id="memberCount" style="font-weight:400;"></span></div>
              <div class="col-search"><input type="search" id="memberSearch" placeholder="Søg..." oninput="filterMembers()" /></div>
              <div class="col-body" id="memberBody"></div>
            </div>

            <div class="btn-col">
              <button class="arrow-btn" onclick="removeSelected()" title="Fjern valgte">◀</button>
              <button class="arrow-btn" onclick="addSelected()" title="Tilføj valgte">▶</button>
            </div>

            <div class="col">
              <div class="col-header light">Alle brugere <span id="allUserCount" style="font-weight:400;"></span></div>
              <div class="col-search"><input type="search" id="userSearch" placeholder="Søg..." oninput="filterUsers()" /></div>
              <div class="col-body" id="userBody"></div>
            </div>
          </div>

          <div class="editor-footer" id="editorFooter">
            <div class="changes-info" id="changesInfo"></div>
            <div style="display:flex;gap:8px;">
              <button class="btn-cancel" onclick="cancelChanges()">Annuller</button>
              <button class="btn-save" id="saveBtn" onclick="saveChanges()">Gem ændringer</button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ALLOWED_ROLES = ["portal_admin", "portal_it_support"];

let allGroups    = [];
let allUsers     = [];
let currentGroup = null;

// Arbejdskopier af medlemmer (med pending ændringer)
let workingMembers = []; // { id, displayName, mail }
let originalMembers = [];

// ── Auth ─────────────────────────────────────────────────────────────────────
(async () => {
  const me = await fetch("/.auth/me").then(r => r.json()).catch(() => null);
  if (!me?.clientPrincipal?.userDetails) { location.href = "/unauthorized.html"; return; }
  const roles = (await fetch("/api/getRoles").then(r => r.json()).catch(() => ({roles:[]}))).roles ?? [];
  if (!roles.some(r => ALLOWED_ROLES.includes(r))) { location.href = "/unauthorized.html"; return; }
  document.getElementById("appContent").style.setProperty("display", "block", "important");
  loadGroups();
})();

// ── Tile toggle ───────────────────────────────────────────────────────────────
function toggleTile(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector(".tile-chevron");
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "";
  chevron.classList.toggle("open", !isOpen);
}

// ── Hent grupper ─────────────────────────────────────────────────────────────
async function loadGroups() {
  try {
    const res = await fetch("/api/getGroups");
    if (!res.ok) throw new Error();
    const data = await res.json();
    allGroups = data.groups ?? [];

    document.getElementById("groupsLoading").style.display = "none";
    document.getElementById("groupsContainer").style.display = "";

    renderGroupList();

    // Hent alle brugere i baggrunden
    loadAllUsers();
  } catch {
    document.getElementById("groupsLoading").style.display = "none";
    document.getElementById("groupsError").style.display = "";
  }
}

function renderGroupList() {
  const list = document.getElementById("groupList");
  list.innerHTML = "";
  allGroups.forEach(g => {
    const div = document.createElement("div");
    div.className = "group-item" + (currentGroup?.id === g.id ? " active" : "");
    div.innerHTML = `
      <div>
        <div class="group-name">${esc(g.displayName)}</div>
        <div class="group-email">${esc(g.mail ?? "")}</div>
      </div>
      <div class="member-count" id="mc-${g.id}">⏳</div>
    `;
    div.onclick = () => selectGroup(g);
    list.appendChild(div);
  });
}

// ── Vælg gruppe ───────────────────────────────────────────────────────────────
async function selectGroup(group) {
  if (currentGroup?.id === group.id) return;

  currentGroup = group;
  renderGroupList();

  const editor = document.getElementById("groupEditor");
  editor.classList.add("visible");

  // Stamdata
  renderStamdata(group);

  // Hent medlemmer
  document.getElementById("memberBody").innerHTML = '<div class="loading"><span class="spinner"></span>Henter...</div>';
  document.getElementById("memberCount").textContent = "";

  try {
    const res = await fetch(`/api/getGroupMembers?id=${encodeURIComponent(group.id)}`);
    const data = await res.json();
    originalMembers = data.members ?? [];
    workingMembers  = [...originalMembers];

    renderMembers();
    updateMemberCount(group.id, originalMembers.length);
    updateFooter();
  } catch {
    document.getElementById("memberBody").innerHTML = '<div class="empty">Kunne ikke hente medlemmer.</div>';
  }
}

function renderStamdata(g) {
  document.getElementById("stamdataBody").innerHTML = `
    <div class="sd-row"><div class="sd-label">Navn</div><div class="sd-value">${esc(g.displayName)}</div></div>
    <div class="sd-row"><div class="sd-label">E-mail</div><div class="sd-value">${esc(g.mail ?? "—")}</div></div>
    <div class="sd-row"><div class="sd-label">Beskrivelse</div><div class="sd-value">${esc(g.description ?? "—")}</div></div>
    <div class="sd-row"><div class="sd-label">Oprettet</div><div class="sd-value">${esc(g.createdDateTime ? g.createdDateTime.substring(0,10) : "—")}</div></div>
    <div class="sd-row"><div class="sd-label">Gruppe ID</div><div class="sd-value" style="font-size:.75rem;color:#9ca3af;">${esc(g.id)}</div></div>
  `;
}

function updateMemberCount(groupId, count) {
  const el = document.getElementById(`mc-${groupId}`);
  if (el) el.textContent = count + " medlemmer";
}

// ── Render medlemmer ──────────────────────────────────────────────────────────
let selectedMembers = new Set(); // id'er valgt til fjernelse

function renderMembers(filter = "") {
  const body = document.getElementById("memberBody");
  const q = filter.toLowerCase();
  const list = workingMembers.filter(u =>
    !q || u.displayName?.toLowerCase().includes(q) || u.mail?.toLowerCase().includes(q)
  );

  document.getElementById("memberCount").textContent = `(${workingMembers.length})`;

  if (list.length === 0) {
    body.innerHTML = '<div class="empty">Ingen medlemmer</div>';
    return;
  }

  body.innerHTML = "";
  list.forEach(u => {
    const div = document.createElement("div");
    div.className = "user-item" + (selectedMembers.has(u.id) ? " selected" : "");
    div.innerHTML = `
      <div class="user-avatar">${initials(u.displayName)}</div>
      <div class="user-info">
        <div class="user-name">${esc(u.displayName)}</div>
        <div class="user-email">${esc(u.mail ?? "")}</div>
      </div>
      <div class="user-check"></div>
    `;
    div.onclick = () => {
      if (selectedMembers.has(u.id)) selectedMembers.delete(u.id);
      else selectedMembers.add(u.id);
      renderMembers(document.getElementById("memberSearch").value);
    };
    body.appendChild(div);
  });
}

function filterMembers() {
  renderMembers(document.getElementById("memberSearch").value);
}

// ── Hent alle brugere ─────────────────────────────────────────────────────────
let selectedUsers = new Set(); // id'er valgt til tilføjelse

async function loadAllUsers() {
  try {
    const res = await fetch("/api/getUsers");
    const data = await res.json();
    allUsers = data.users ?? [];
    document.getElementById("allUserCount").textContent = `(${allUsers.length})`;
    renderUsers();
  } catch {
    document.getElementById("userBody").innerHTML = '<div class="empty">Kunne ikke hente brugere.</div>';
  }
}

function renderUsers(filter = "") {
  const body = document.getElementById("userBody");
  const q = filter.toLowerCase();

  // Filtrer: ikke allerede medlem + søg
  const memberIds = new Set(workingMembers.map(m => m.id));
  const list = allUsers.filter(u =>
    !memberIds.has(u.id) &&
    (!q || u.displayName?.toLowerCase().includes(q) || u.mail?.toLowerCase().includes(q))
  );

  if (list.length === 0) {
    body.innerHTML = '<div class="empty">Ingen brugere at vise</div>';
    return;
  }

  body.innerHTML = "";
  list.forEach(u => {
    const div = document.createElement("div");
    div.className = "user-item" + (selectedUsers.has(u.id) ? " selected" : "");
    div.innerHTML = `
      <div class="user-avatar">${initials(u.displayName)}</div>
      <div class="user-info">
        <div class="user-name">${esc(u.displayName)}</div>
        <div class="user-email">${esc(u.mail ?? "")}</div>
      </div>
      <div class="user-check"></div>
    `;
    div.onclick = () => {
      if (selectedUsers.has(u.id)) selectedUsers.delete(u.id);
      else selectedUsers.add(u.id);
      renderUsers(document.getElementById("userSearch").value);
    };
    body.appendChild(div);
  });
}

function filterUsers() {
  renderUsers(document.getElementById("userSearch").value);
}

// ── Tilføj / fjern ────────────────────────────────────────────────────────────
function addSelected() {
  if (selectedUsers.size === 0) return;
  const toAdd = allUsers.filter(u => selectedUsers.has(u.id));
  workingMembers = [...workingMembers, ...toAdd];
  selectedUsers.clear();
  renderMembers(document.getElementById("memberSearch").value);
  renderUsers(document.getElementById("userSearch").value);
  updateFooter();
}

function removeSelected() {
  if (selectedMembers.size === 0) return;
  workingMembers = workingMembers.filter(u => !selectedMembers.has(u.id));
  selectedMembers.clear();
  renderMembers(document.getElementById("memberSearch").value);
  renderUsers(document.getElementById("userSearch").value);
  updateFooter();
}

// ── Footer med ændringer ──────────────────────────────────────────────────────
function updateFooter() {
  const origIds    = new Set(originalMembers.map(m => m.id));
  const workingIds = new Set(workingMembers.map(m => m.id));

  const toAdd    = workingMembers.filter(m => !origIds.has(m.id));
  const toRemove = originalMembers.filter(m => !workingIds.has(m.id));

  const footer = document.getElementById("editorFooter");
  const info   = document.getElementById("changesInfo");

  if (toAdd.length === 0 && toRemove.length === 0) {
    info.innerHTML = "Ingen ændringer";
    document.getElementById("saveBtn").disabled = true;
  } else {
    const parts = [];
    if (toAdd.length > 0)    parts.push(`<strong>+${toAdd.length}</strong> tilføjes`);
    if (toRemove.length > 0) parts.push(`<strong>-${toRemove.length}</strong> fjernes`);
    info.innerHTML = parts.join(" · ");
    document.getElementById("saveBtn").disabled = false;
  }
}

function cancelChanges() {
  workingMembers = [...originalMembers];
  selectedMembers.clear();
  selectedUsers.clear();
  renderMembers();
  renderUsers(document.getElementById("userSearch").value);
  updateFooter();
}

// ── Gem ───────────────────────────────────────────────────────────────────────
async function saveChanges() {
  const origIds    = new Set(originalMembers.map(m => m.id));
  const workingIds = new Set(workingMembers.map(m => m.id));

  const toAdd    = workingMembers.filter(m => !origIds.has(m.id)).map(m => m.id);
  const toRemove = originalMembers.filter(m => !workingIds.has(m.id)).map(m => m.id);

  if (toAdd.length === 0 && toRemove.length === 0) return;

  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "Gemmer...";

  try {
    const res = await fetch("/api/updateGroupMembers", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ groupId: currentGroup.id, add: toAdd, remove: toRemove })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error ?? "Ukendt fejl");

    originalMembers = [...workingMembers];
    updateMemberCount(currentGroup.id, originalMembers.length);
    updateFooter();
    showToast("Ændringer gemt ✓", "ok");
  } catch (err) {
    showToast("Fejl: " + err.message, "err");
  } finally {
    btn.textContent = "Gem ændringer";
    btn.disabled = false;
  }
}

// ── Hjælpere ──────────────────────────────────────────────────────────────────
function initials(name) {
  if (!name) return "?";
  const parts = name.trim().split(" ");
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : name[0].toUpperCase();
}

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3500);
}
</script>

</body>
</html>
