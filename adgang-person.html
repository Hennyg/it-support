<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adgang person — IT Support</title>
  <link rel="stylesheet" href="/assets/navbar.css" />
  <meta name="herrup-app" content="it-support">
  <meta name="herrup-title" content="IT Support">
  <meta name="herrup-subtitle" content="Adgang person">
  <script src="/assets/navbar.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #111827; }
    .container { max-width: 1400px; margin: 0 auto; padding: 32px 20px; }

    /* Tiles */
    .tile { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.05); margin-bottom: 16px; overflow: visible; }
    .tile-header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid #f3f4f6; cursor: pointer; user-select: none; }
    .tile-icon { font-size: 1.2rem; }
    .tile-title { font-size: 1rem; font-weight: 700; color: #111827; flex: 1; }
    .tile-chevron { color: #9ca3af; font-size: .9rem; transition: transform .2s; }
    .tile-chevron.open { transform: rotate(180deg); }
    .tile-body { padding: 20px 24px; }

    /* Person søg */
    .person-search-wrap { position: relative; margin-bottom: 16px; }
    .person-search-wrap input { width: 100%; padding: 10px 16px; border: 1px solid #e5e7eb; border-radius: 12px; font-size: .95rem; outline: none; }
    .person-search-wrap input:focus { border-color: #850c18; box-shadow: 0 0 0 3px rgba(133,12,24,.08); }
    .person-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.1); z-index: 100; max-height: 320px; overflow-y: auto; display: none; }
    .person-dropdown.open { display: block; }
    .person-opt { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; border-bottom: 1px solid #f9fafb; transition: background .1s; }
    .person-opt:last-child { border-bottom: none; }
    .person-opt:hover { background: #fef3f2; }
    .person-opt.active { background: #fef3f2; }
    .p-avatar { width: 30px; height: 30px; border-radius: 50%; background: #850c18; color: #fff; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; }
    .p-name { font-size: .88rem; font-weight: 600; color: #111827; }
    .p-mail { font-size: .75rem; color: #6b7280; }

    /* Editor grid */
    .editor { display: grid; grid-template-columns: 240px 1fr auto 1fr; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }

    .col { display: flex; flex-direction: column; min-width: 0; }
    .col-header { padding: 11px 16px; background: #1f2937; color: #fff; font-size: .83rem; font-weight: 700; flex-shrink: 0; }
    .col-header.light { background: #f8fafc; color: #374151; border-bottom: 1px solid #e5e7eb; }
    .col-body { flex: 1; overflow-y: auto; max-height: 420px; }

    /* Stamdata */
    .stamdata { border-right: 1px solid #e5e7eb; }
    .stamdata .col-body { padding: 14px 16px; }
    .sd-row { margin-bottom: 12px; }
    .sd-label { font-size: .72rem; color: #6b7280; margin-bottom: 2px; text-transform: uppercase; letter-spacing: .03em; }
    .sd-value { font-size: .87rem; color: #111827; font-weight: 500; word-break: break-word; }
    .sd-avatar { width: 56px; height: 56px; border-radius: 50%; background: #850c18; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; margin: 4px 0 16px; }

    /* Gruppe liste */
    .member-list { border-right: 1px solid #e5e7eb; }
    .group-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px; cursor: pointer; border-bottom: 1px solid #f9fafb; transition: background .1s; }
    .group-item:hover { background: #f9fafb; }
    .group-item.selected { background: #eff6ff; }
    .group-icon { width: 28px; height: 28px; border-radius: 8px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: .8rem; flex-shrink: 0; }
    .group-info { flex: 1; min-width: 0; }
    .group-name { font-size: .83rem; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .group-mail { font-size: .72rem; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .group-check { width: 15px; height: 15px; border-radius: 3px; border: 2px solid #d1d5db; flex-shrink: 0; }
    .group-item.selected .group-check { background: #850c18; border-color: #850c18; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: center; }

    /* Pile */
    .btn-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 16px 10px; background: #f8fafc; border-right: 1px solid #e5e7eb; min-width: 50px; }
    .arrow-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-size: .95rem; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .arrow-btn:hover { background: #850c18; color: #fff; border-color: #850c18; }

    /* Søg */
    .col-search { padding: 7px 12px; border-bottom: 1px solid #f3f4f6; flex-shrink: 0; }
    .col-search input { width: 100%; padding: 5px 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: .82rem; outline: none; }
    .col-search input:focus { border-color: #850c18; }

    /* Footer */
    .editor-footer { padding: 12px 20px; background: #f8fafc; border-top: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 0; }
    .changes-info { font-size: .85rem; color: #6b7280; }
    .changes-info strong { color: #111827; }
    .btn-save { padding: 8px 22px; background: #850c18; color: #fff; border: none; border-radius: 10px; font-size: .88rem; font-weight: 600; cursor: pointer; }
    .btn-save:hover { background: #6b0913; }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .btn-cancel { padding: 8px 14px; background: #fff; color: #374151; border: 1px solid #e5e7eb; border-radius: 10px; font-size: .88rem; cursor: pointer; }
    .btn-cancel:hover { background: #f3f4f6; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 12px; font-size: .9rem; font-weight: 600; color: #fff; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.ok  { background: #16a34a; }
    .toast.err { background: #dc2626; }

    .loading { padding: 24px; text-align: center; color: #9ca3af; font-size: .88rem; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #e5e7eb; border-top-color: #850c18; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { padding: 20px; text-align: center; color: #9ca3af; font-size: .85rem; }

    #editorTile { display: none; }
  </style>
</head>
<body>

<div id="appContent" style="display:none;">
  <div class="container">

    <!-- Søg person tile -->
    <div class="tile">
      <div class="tile-header" onclick="toggleTile(this)">
        <div class="tile-icon">👤</div>
        <div class="tile-title">Vælg person</div>
        <div class="tile-chevron open">▼</div>
      </div>
      <div class="tile-body">
        <div class="person-search-wrap">
          <input type="search" id="personSearch" placeholder="Søg efter navn eller e-mail..." autocomplete="off" oninput="searchPersons()" onfocus="openDropdown()" />
          <div class="person-dropdown" id="personDropdown"></div>
        </div>
        <div id="searchHint" style="font-size:.85rem;color:#9ca3af;">Skriv mindst 2 tegn for at søge</div>
      </div>
    </div>

    <!-- Editor tile -->
    <div class="tile" id="editorTile">
      <div class="tile-header" onclick="toggleTile(this)">
        <div class="tile-icon">✏️</div>
        <div class="tile-title" id="editorTileTitle">Gruppemedlemskaber</div>
        <div class="tile-chevron open">▼</div>
      </div>
      <div class="tile-body" style="padding:0;">

        <div class="editor" id="personEditor">
          <!-- Stamdata -->
          <div class="col stamdata">
            <div class="col-header">Person</div>
            <div class="col-body" id="stamdataBody">
              <div class="empty">Vælg en person</div>
            </div>
          </div>

          <!-- Nuværende grupper -->
          <div class="col member-list">
            <div class="col-header light">
              Medlemskaber <span id="memberCount" style="font-weight:400;"></span>
            </div>
            <div class="col-search">
              <input type="search" id="memberSearch" placeholder="Søg..." oninput="filterMembers()" />
            </div>
            <div class="col-body" id="memberBody">
              <div class="empty">Vælg en person</div>
            </div>
          </div>

          <!-- Pile -->
          <div class="btn-col">
            <button class="arrow-btn" onclick="addSelected()" title="Tilføj valgte grupper">◀</button>
            <button class="arrow-btn" onclick="removeSelected()" title="Fjern valgte grupper">▶</button>
          </div>

          <!-- Alle grupper -->
          <div class="col">
            <div class="col-header light">
              Alle grupper <span id="allGroupCount" style="font-weight:400;"></span>
            </div>
            <div class="col-search">
              <input type="search" id="groupSearch" placeholder="Søg..." oninput="filterGroups()" />
            </div>
            <div class="col-body" id="groupBody">
              <div class="loading"><span class="spinner"></span>Henter grupper...</div>
            </div>
          </div>
        </div>

        <div class="editor-footer">
          <div class="changes-info" id="changesInfo">Ingen ændringer</div>
          <div style="display:flex;gap:8px;">
            <button class="btn-cancel" onclick="cancelChanges()">Annuller</button>
            <button class="btn-save" id="saveBtn" onclick="saveChanges()" disabled>Gem ændringer</button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ALLOWED_ROLES = ["portal_admin", "portal_it_support"];

let allUsers     = [];
let allGroups    = [];
let currentUser  = null;

let workingMemberships  = []; // { id, displayName, mail }
let originalMemberships = [];
let selectedMemberships = new Set(); // til fjernelse
let selectedGroups      = new Set(); // til tilføjelse

// ── Auth ──────────────────────────────────────────────────────────────────────
(async () => {
  const me = await fetch("/.auth/me").then(r => r.json()).catch(() => null);
  if (!me?.clientPrincipal?.userDetails) { location.href = "/unauthorized.html"; return; }
  const roles = (await fetch("/api/getRoles").then(r => r.json()).catch(() => ({roles:[]}))).roles ?? [];
  if (!roles.some(r => ALLOWED_ROLES.includes(r))) { location.href = "/unauthorized.html"; return; }
  document.getElementById("appContent").style.setProperty("display", "block", "important");
  init();
})();

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const [userRes, groupRes] = await Promise.all([
    fetch("/api/getUsers").then(r => r.json()).catch(() => ({ users: [] })),
    fetch("/api/getAllGroups").then(r => r.json()).catch(() => ({ groups: [] }))
  ]);

  // Kun rigtige personer
  allUsers  = (userRes.users ?? []).filter(u => u.mailboxType === "user");
  allGroups = groupRes.groups ?? [];

  document.getElementById("allGroupCount").textContent = `(${allGroups.length})`;
  renderGroups();
}

// ── Person søg ────────────────────────────────────────────────────────────────
function searchPersons() {
  const q = document.getElementById("personSearch").value.toLowerCase().trim();
  const hint = document.getElementById("searchHint");

  if (q.length < 2) {
    hint.style.display = "";
    closeDropdown();
    return;
  }

  hint.style.display = "none";
  const matches = allUsers.filter(u =>
    u.displayName?.toLowerCase().includes(q) ||
    u.mail?.toLowerCase().includes(q)
  ).slice(0, 20);

  renderDropdown(matches);
  openDropdown();
}

function renderDropdown(users) {
  const dd = document.getElementById("personDropdown");
  if (users.length === 0) {
    dd.innerHTML = '<div class="empty">Ingen resultater</div>';
    return;
  }
  dd.innerHTML = "";
  users.forEach(u => {
    const div = document.createElement("div");
    div.className = "person-opt";
    div.innerHTML = `
      <div class="p-avatar">${initials(u.displayName)}</div>
      <div>
        <div class="p-name">${esc(u.displayName)}</div>
        <div class="p-mail">${esc(u.mail ?? "")}</div>
      </div>`;
    div.onclick = () => selectPerson(u);
    dd.appendChild(div);
  });
}

function openDropdown() {
  const q = document.getElementById("personSearch").value.trim();
  if (q.length >= 2) document.getElementById("personDropdown").classList.add("open");
}

function closeDropdown() {
  document.getElementById("personDropdown").classList.remove("open");
}

document.addEventListener("click", e => {
  if (!e.target.closest(".person-search-wrap")) closeDropdown();
});

// ── Vælg person ───────────────────────────────────────────────────────────────
async function selectPerson(user) {
  currentUser = user;
  closeDropdown();
  document.getElementById("personSearch").value = user.displayName;
  document.getElementById("searchHint").style.display = "none";

  // Vis editor tile
  const editorTile = document.getElementById("editorTile");
  editorTile.style.setProperty("display", "block", "important");
  document.getElementById("editorTileTitle").textContent = `Gruppemedlemskaber — ${user.displayName}`;
  editorTile.querySelector(".tile-body").style.display = "";
  editorTile.querySelector(".tile-chevron").classList.add("open");
  setTimeout(() => editorTile.scrollIntoView({ behavior: "smooth", block: "start" }), 50);

  renderStamdata(user);

  document.getElementById("memberBody").innerHTML = '<div class="loading"><span class="spinner"></span>Henter...</div>';
  document.getElementById("memberCount").textContent = "";
  selectedMemberships.clear();
  selectedGroups.clear();

  try {
    const data = await fetch(`/api/getUserMemberships?id=${encodeURIComponent(user.id)}`).then(r => r.json());
    originalMemberships = data.groups ?? [];
    workingMemberships  = [...originalMemberships];
    renderMembers();
    renderGroups();
    updateFooter();
  } catch {
    document.getElementById("memberBody").innerHTML = '<div class="empty">Kunne ikke hente gruppemedlemskaber.</div>';
  }
}

function renderStamdata(u) {
  document.getElementById("stamdataBody").innerHTML = `
    <div class="sd-avatar">${initials(u.displayName)}</div>
    <div class="sd-row"><div class="sd-label">Navn</div><div class="sd-value">${esc(u.displayName)}</div></div>
    <div class="sd-row"><div class="sd-label">E-mail</div><div class="sd-value">${esc(u.mail ?? "—")}</div></div>
  `;
}

// ── Tile toggle ───────────────────────────────────────────────────────────────
function toggleTile(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector(".tile-chevron");
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "";
  chevron.classList.toggle("open", !isOpen);
}

// ── Render nuværende gruppemedlemskaber ───────────────────────────────────────
function renderMembers(filter = "") {
  const body = document.getElementById("memberBody");
  const q = filter.toLowerCase();
  const list = workingMemberships.filter(g =>
    !q || g.displayName?.toLowerCase().includes(q) || g.mail?.toLowerCase().includes(q)
  );

  document.getElementById("memberCount").textContent = `(${workingMemberships.length})`;

  if (list.length === 0) { body.innerHTML = '<div class="empty">Ingen gruppemedlemskaber</div>'; return; }

  body.innerHTML = "";
  list.forEach(g => {
    const div = document.createElement("div");
    div.className = "group-item" + (selectedMemberships.has(g.id) ? " selected" : "");
    div.innerHTML = `
      <div class="group-icon">👥</div>
      <div class="group-info">
        <div class="group-name">${esc(g.displayName)}</div>
        <div class="group-mail">${esc(g.mail ?? "")}</div>
      </div>
      <div class="group-check"></div>`;
    div.onclick = () => {
      selectedMemberships.has(g.id) ? selectedMemberships.delete(g.id) : selectedMemberships.add(g.id);
      renderMembers(document.getElementById("memberSearch").value);
    };
    body.appendChild(div);
  });
}

function filterMembers() { renderMembers(document.getElementById("memberSearch").value); }

// ── Render alle grupper ───────────────────────────────────────────────────────
function getVisibleGroups() {
  const q = document.getElementById("groupSearch").value.toLowerCase();
  const memberIds = new Set(workingMemberships.map(g => g.id));
  return allGroups.filter(g => {
    if (memberIds.has(g.id)) return false;
    if (q && !g.displayName?.toLowerCase().includes(q) && !g.mail?.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderGroups() {
  const body = document.getElementById("groupBody");
  const list = getVisibleGroups();
  if (list.length === 0) { body.innerHTML = '<div class="empty">Ingen grupper at vise</div>'; return; }
  body.innerHTML = "";
  list.forEach(g => {
    const div = document.createElement("div");
    div.className = "group-item" + (selectedGroups.has(g.id) ? " selected" : "");
    div.innerHTML = `
      <div class="group-icon">👥</div>
      <div class="group-info">
        <div class="group-name">${esc(g.displayName)}</div>
        <div class="group-mail">${esc(g.mail ?? "")}</div>
      </div>
      <div class="group-check"></div>`;
    div.onclick = () => {
      selectedGroups.has(g.id) ? selectedGroups.delete(g.id) : selectedGroups.add(g.id);
      renderGroups();
    };
    body.appendChild(div);
  });
}

function filterGroups() { renderGroups(); }

// ── Tilføj / fjern ────────────────────────────────────────────────────────────
function addSelected() {
  if (selectedGroups.size === 0) return;
  const toAdd = allGroups.filter(g => selectedGroups.has(g.id));
  workingMemberships = [...workingMemberships, ...toAdd];
  selectedGroups.clear();
  renderMembers(document.getElementById("memberSearch").value);
  renderGroups();
  updateFooter();
}

function removeSelected() {
  if (selectedMemberships.size === 0) return;
  workingMemberships = workingMemberships.filter(g => !selectedMemberships.has(g.id));
  selectedMemberships.clear();
  renderMembers(document.getElementById("memberSearch").value);
  renderGroups();
  updateFooter();
}

// ── Footer ────────────────────────────────────────────────────────────────────
function updateFooter() {
  const origIds = new Set(originalMemberships.map(g => g.id));
  const workIds = new Set(workingMemberships.map(g => g.id));
  const toAdd   = workingMemberships.filter(g => !origIds.has(g.id));
  const toRem   = originalMemberships.filter(g => !workIds.has(g.id));
  const info    = document.getElementById("changesInfo");

  if (toAdd.length === 0 && toRem.length === 0) {
    info.innerHTML = "Ingen ændringer";
    document.getElementById("saveBtn").disabled = true;
  } else {
    const parts = [];
    if (toAdd.length > 0) parts.push(`<strong>+${toAdd.length}</strong> grupper tilføjes`);
    if (toRem.length > 0) parts.push(`<strong>-${toRem.length}</strong> grupper fjernes`);
    info.innerHTML = parts.join(" · ");
    document.getElementById("saveBtn").disabled = false;
  }
}

function cancelChanges() {
  workingMemberships = [...originalMemberships];
  selectedMemberships.clear();
  selectedGroups.clear();
  renderMembers();
  renderGroups();
  updateFooter();
}

// ── Gem ───────────────────────────────────────────────────────────────────────
async function saveChanges() {
  const origIds = new Set(originalMemberships.map(g => g.id));
  const workIds = new Set(workingMemberships.map(g => g.id));
  const toAdd   = workingMemberships.filter(g => !origIds.has(g.id));
  const toRem   = originalMemberships.filter(g => !workIds.has(g.id));
  if (toAdd.length === 0 && toRem.length === 0) return;

  const btn = document.getElementById("saveBtn");
  btn.disabled = true; btn.textContent = "Gemmer...";

  const errors = [];

  try {
    // Tilføj person til grupper
    for (const group of toAdd) {
      try {
        const res = await fetch("/api/updateGroupMembers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ groupId: group.id, add: [currentUser.id], remove: [] })
        });
        const data = await res.json();
        if (!res.ok) errors.push(`Tilføj til ${group.displayName}: ${data.error}`);
      } catch (e) {
        errors.push(`Tilføj til ${group.displayName}: ${e.message}`);
      }
    }

    // Fjern person fra grupper
    for (const group of toRem) {
      try {
        const res = await fetch("/api/updateGroupMembers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ groupId: group.id, add: [], remove: [currentUser.id] })
        });
        const data = await res.json();
        if (!res.ok) errors.push(`Fjern fra ${group.displayName}: ${data.error}`);
      } catch (e) {
        errors.push(`Fjern fra ${group.displayName}: ${e.message}`);
      }
    }

    if (errors.length > 0) {
      showToast(`${errors.length} fejl — se console`, "err");
      console.error("Fejl ved gem:", errors);
    } else {
      originalMemberships = [...workingMemberships];
      updateFooter();
      showToast("Ændringer gemt ✓", "ok");
    }
  } finally {
    btn.textContent = "Gem ændringer"; btn.disabled = false;
  }
}

// ── Hjælpere ──────────────────────────────────────────────────────────────────
function initials(name) {
  if (!name) return "?";
  const parts = name.trim().split(" ");
  return parts.length >= 2 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : name[0].toUpperCase();
}

function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3500);
}
</script>
</body>
</html>
