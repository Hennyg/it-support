<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anden hjælp — IT Support</title>
  <link rel="stylesheet" href="/assets/navbar.css" />
  <meta name="herrup-app" content="it-support">
  <meta name="herrup-title" content="IT Support">
  <meta name="herrup-subtitle" content="Anden hjælp">
  <script src="/assets/navbar.js"></script>
  <script src="/assets/auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f3f4f6; color: #111827; min-height: 100vh; }
    #appContent { display: none; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 1.8rem; margin: 0 0 8px; }
    .subtitle { color: #6b7280; margin: 0 0 32px; font-size: 1rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.05); transition: box-shadow .15s, border-color .15s; text-decoration: none; color: inherit; display: block; cursor: pointer; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); border-color: #850c18; }
    .card-icon { font-size: 2rem; margin-bottom: 12px; }
    .card h2 { margin: 0 0 8px; font-size: 1.1rem; }
    .card p { margin: 0; font-size: .95rem; color: #6b7280; line-height: 1.55; }
  </style>
</head>
<body>

<div id="appContent">
  <div class="container">
    <h1>Anden hjælp</h1>
    <p class="subtitle">Yderligere værktøjer og ressourcer til IT-support.</p>

    <div class="cards">
      <a class="card" href="/teamsbaggrunde.html">
        <div class="card-icon">🖼️</div>
        <h2>Hent Teams baggrunde</h2>
        <p>Udvælg de baggrunde som du gerne vil benytte i Teams møder.</p>
      </a>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  ITAuth.requireAuth(({ user }) => {
    document.getElementById("appContent").style.setProperty("display", "block", "important");
  });
});
</script>

</body>
</html>
